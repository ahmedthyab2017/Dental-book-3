services:
  postgres:
    image: postgres:16-alpine
    container_name: dantal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dantal
      POSTGRES_USER: dantal
      POSTGRES_PASSWORD: dantal
    ports:
      - "5433:5432"
    volumes:
      - dantal_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dantal -d dantal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dantal_pg_data:
