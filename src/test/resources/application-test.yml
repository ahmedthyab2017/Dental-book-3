spring:
  datasource:
    url: jdbc:h2:mem:dantal_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

dantal:
  security:
    jwt:
      secret: test-secret-key-minimum-256-bits-long-for-hmac-sha256-algorithm-requirement
    cors:
      allowed-origins:
        - http://localhost:3000
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - Authorization
        - Content-Type
        - X-Device-Id
        - X-App-Version

logging:
  level:
    root: WARN
    com.dantal: INFO
