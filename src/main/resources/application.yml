spring:
  application:
    name: dantal-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-stacktrace: never
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

dantal:
  security:
    jwt:
      issuer: dantal-api
      access-token-expiration-minutes: ${JWT_ACCESS_MINUTES:15}
      refresh-token-expiration-days: ${JWT_REFRESH_DAYS:30}
      secret: ${JWT_SECRET:CHANGE_ME_USE_256_BIT_SECRET_IN_PRODUCTION_ENVIRONMENT}
    cors:
      allowed-origins:
        - http://localhost:3000
        - http://127.0.0.1:3000
        - http://localhost:3001
        - http://127.0.0.1:3001
        - http://localhost:3002
        - http://127.0.0.1:3002
      allowed-origin-patterns: []
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - Authorization
        - Content-Type
        - X-Device-Id
        - X-App-Version
      max-age-seconds: 3600

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.dantal: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
