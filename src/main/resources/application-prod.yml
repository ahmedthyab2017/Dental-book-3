spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:dantal}
    username: ${PGUSER:dantal}
    password: ${PGPASSWORD:dantal}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

server:
  port: ${PORT:8080}

logging:
  level:
    root: WARN
    com.dantal: INFO

dantal:
  security:
    jwt:
      secret: ${JWT_SECRET}
    cors:
      allowed-origins:
        - ${FRONTEND_URL:https://localhost:3000}
      allowed-origin-patterns:
        - https://*.vercel.app
